<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <title>WhatsApp API QR Auth</title>
      <style>
         * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
         }
         body {
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f0f2f5;
            color: #111;
         }
         h1 {
            font-size: 1.4rem;
            margin-bottom: 1rem;
         }
         #status {
            padding: 0.4rem 1rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            background: #e2e8f0;
            color: #334155;
         }
         #status.ready {
            background: #dcfce7;
            color: #166534;
         }
         #status.qr {
            background: #fef9c3;
            color: #854d0e;
         }
         #status.error {
            background: #fee2e2;
            color: #991b1b;
         }
         #qr-container {
            background: white;
            padding: 1.5rem;
            border-radius: 1rem;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
         }
         #qr-container img {
            display: block;
            width: 256px;
            height: 256px;
         }
         #qr-container p {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 0.75rem;
         }
      </style>
   </head>
   <body>
      <h1>WhatsApp API Authentication</h1>
      <div id="status">Connecting…</div>
      <div id="qr-container">
         <img id="qr-img" src="" alt="QR Code" style="display: none" />
         <p id="qr-hint">Waiting for QR code…</p>
      </div>

      <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
      <script>
         const socket = io();
         const statusEl = document.getElementById("status");
         const qrImg = document.getElementById("qr-img");
         const qrHint = document.getElementById("qr-hint");

         socket.on("qr", (dataUrl) => {
            qrImg.src = dataUrl;
            qrImg.style.display = "block";
            qrHint.textContent = "Scan with WhatsApp on your phone";
            setStatus("QR Ready – scan now", "qr");
         });

         socket.on("status", (status) => {
            if (status === "READY") {
               qrImg.style.display = "none";
               qrHint.textContent = "WhatsApp is connected!";
               setStatus("Connected and Ready", "ready");
            } else if (status === "AUTH_FAILURE") {
               setStatus("Authentication failed", "error");
            } else {
               setStatus(status, "");
            }
         });

         function setStatus(text, cls) {
            statusEl.textContent = text;
            statusEl.className = cls;
         }
      </script>
   </body>
</html>
